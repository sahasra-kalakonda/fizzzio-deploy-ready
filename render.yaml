services:
  - type: web
    name: fizzzio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    plan: free
    envVars:
      - key: FIZZZIO_SECRET_KEY
        generateValue: true
      - key: FIZZZIO_HTTPS
        value: "1"
      - key: FIZZZIO_ALLOWED_ORIGINS
        value: "http://localhost:8080"
        # ⬆️ Update this in the Render dashboard after your frontend
        # is deployed — set it to your real Netlify/Vercel URL.
      - key: FIZZZIO_DB_PATH
        value: "/data/fizzzio.db"
    disk:
      name: fizzzio-data
      mountPath: /data
      sizeGB: 1
