services:
  - type: web
    name: fizzzio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    plan: free
    envVars:
      - key: FIZZZIO_SECRET_KEY
        generateValue: true
      - key: FIZZZIO_HTTPS
        value: "1"
      - key: FIZZZIO_ALLOWED_ORIGINS
        value: "http://localhost:8080"
        # ⬆️ Update this in the Render dashboard after your frontend
        # is deployed — set it to your real Netlify/Vercel URL.
    # NOTE: Render's free tier doesn't support persistent disks, so
    # there's no FIZZZIO_DB_PATH override here — the SQLite file lives
    # in the app's own ephemeral filesystem (backend/fizzzio.db) and
    # will reset on every redeploy/restart. Fine for a demo; if you
    # need data to survive restarts, upgrade to a paid plan and add
    # a disk block back in (see backend/README.md).
